<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Appointment Box</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #a1c4fd, #c2e9fb);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .msg-box {
      background-color: #ffffff;
      border-radius: 15px;
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
      padding: 30px 40px;
      text-align: center;
      width: 350px;
      transition: transform 0.3s ease;
    }

    .msg-box:hover {
      transform: scale(1.03);
    }

    .msg-box h2 {
      margin: 0 0 15px;
      color: #2c3e50;
    }

    .msg-box p {
      color: #555;
      font-size: 16px;
      line-height: 1.5;
    }

    .msg-box button {
      margin-top: 20px;
      padding: 10px 20px;
      border: none;
      background-color: #3498db;
      color: white;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.3s;
    }

    .msg-box button:hover {
      background-color: #2980b9;
    }
  </style>
</head>
<body>
  <div class="msg-box">
    <h2>Booking Confirmed</h2>
    <p>Your appointment with <strong>Dr.SNV Varma raju garu</strong> is confirmed <br>
    <strong><b>NOTE:</b>If your case is urgenet then contact <b>P.Durga prasad Phn:+91 9110577186</b></strong>.</p>
    <button>View Details</button>
  </div>
</body>
</html>
